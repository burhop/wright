# =============================================================================
# Wright — Minimal Docker Compose (Lightweight Deployment)
# =============================================================================
# Strategy: Minimal containerization of the Wright stack (excluding Jaeger/OTEL).
# Resource Saving: Conserves RAM/CPU by running only the core agent appliance.
# Security: All ports bound to 127.0.0.1 (localhost only) per constitution § 4.
# =============================================================================

services:
  # --- Wright Core Agent Appliance ---
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wright_agent_minimal
    env_file:
      - docker/.env
    ports:
      - "127.0.0.1:8080:8000"              # FastAPI (API + static frontend) — localhost only on port 8080
    volumes:
      - wright_data:/home/agent/.local/share/wright
      - wright_workspaces:/home/agent/workspace
      - wright_config:/home/agent/.config/wright
      - wright_hermes:/home/agent/.hermes
      - wright_logs:/var/log/
      # Recovery tools mounted read-only
      - ./scripts:/recovery:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=512m
      - /home/agent/.cache:rw,noexec,nosuid,size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      - WRIGHT_ENV=production
      - WRIGHT_BIND_HOST=0.0.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=        # Explicitly empty to disable remote OTLP export
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  wright_data:
    name: wright_data
  wright_workspaces:
    name: wright_workspaces
  wright_config:
    name: wright_config
  wright_hermes:
    name: wright_hermes
  wright_logs:
    name: wright_logs

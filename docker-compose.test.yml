# =============================================================================
# Wright — Testing/Debugging Docker Compose
# =============================================================================
# Strategy: Mount host-side apps/ and packages/ into the running container
# for code iteration, while keeping the production Dockerfile base and named volumes.
# =============================================================================

services:
  agent:
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wright_agent_test
    env_file:
      - docker/.env
    ports:
      - "127.0.0.1:8080:8000"              # FastAPI (API + static frontend) — localhost only
      - "127.0.0.1:5174:5173"              # Vite Dev server — localhost only
    volumes:
      - wright_home:/home/
      - wright_local:/usr/local/
      - wright_opt:/opt/
      - wright_varlib:/var/lib/
      - wright_varcache:/var/cache/
      - wright_etc:/etc/
      - wright_logs:/var/log/
      # Live-mount application code and packages for testing/iteration
      - ./apps:/workspace/apps
      - ./packages:/workspace/packages
      # Recovery tools mounted read-only
      - ./scripts:/recovery:ro
    environment:
      - WRIGHT_ENV=development
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: wright_jaeger_test
    ports:
      - "127.0.0.1:16686:16686"            # Jaeger UI — localhost only
      - "127.0.0.1:4317:4317"              # OTLP gRPC — localhost only
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

volumes:
  wright_home:
    name: wright_home
  wright_local:
    name: wright_local
  wright_opt:
    name: wright_opt
  wright_varlib:
    name: wright_varlib
  wright_varcache:
    name: wright_varcache
  wright_etc:
    name: wright_etc
  wright_logs:
    name: wright_logs


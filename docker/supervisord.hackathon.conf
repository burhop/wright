[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:wright-api]
command=/usr/local/bin/uv run --project /workspace uvicorn api.main:app --host 0.0.0.0 --port 8000
directory=/workspace
environment=HOME="/home/agent",HERMES_HOME="/home/agent/.hermes",HERMES_PROFILE="wright",WRIGHT_REPO_DIR="/workspace",DATABASE_PATH="/home/agent/.local/share/wright/state.db",PATH="/home/agent/.local/bin:/home/agent/.hermes/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin"
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/wright-api-stdout.log
stderr_logfile=/var/log/supervisor/wright-api-stderr.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

[program:wright-web]
command=/usr/local/bin/npm run dev --workspace=apps/web -- --host 0.0.0.0 --port 5173
directory=/workspace
environment=HOME="/home/agent",BROWSER="none",VITE_API_BASE_URL="http://127.0.0.1:8000",PATH="/home/agent/.local/bin:/home/agent/.hermes/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin"
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/wright-web-stdout.log
stderr_logfile=/var/log/supervisor/wright-web-stderr.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

[program:hermes-gateway]
command=/usr/local/bin/hermes -p wright gateway run
directory=/workspace
environment=HOME="/home/agent",HERMES_HOME="/home/agent/.hermes",HERMES_PROFILE="wright",API_SERVER_ENABLED="true",API_SERVER_HOST="0.0.0.0",API_SERVER_PORT="8642",API_SERVER_KEY="wright-local-dev",HERMES_API_KEY="wright-local-dev",PATH="/home/agent/.local/bin:/home/agent/.hermes/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin"
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/hermes-gateway-stdout.log
stderr_logfile=/var/log/supervisor/hermes-gateway-stderr.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

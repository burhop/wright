[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

; ── Wright API (FastAPI + uvicorn) ──────────────────────────────────────────
[program:wright-api]
command=/usr/local/bin/uv run --project /workspace uvicorn api.main:app --host 0.0.0.0 --port 8000
directory=/workspace
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/wright-api-stdout.log
stderr_logfile=/var/log/supervisor/wright-api-stderr.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

; ── Hermes WebUI (agent API on internal port 8788) ──────────────────────────
[program:hermes-webui]
command=/opt/hermes-webui/.venv/bin/python /opt/hermes-webui/server.py
directory=/opt/hermes-webui
environment=HERMES_HOME="/home/agent/.hermes",HERMES_WEBUI_HOST="127.0.0.1",HERMES_WEBUI_PORT="8788",HERMES_WEBUI_STATE_DIR="/home/agent/.hermes/webui",HERMES_WEBUI_DEFAULT_WORKSPACE="/home/agent/workspace"
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/hermes-webui-stdout.log
stderr_logfile=/var/log/supervisor/hermes-webui-stderr.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

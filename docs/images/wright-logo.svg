<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="neuralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background container -->
  <rect width="100%" height="100%" fill="none" rx="24"/>

  <!-- Main Group -->
  <g transform="translate(0, 0)">
    <!-- Outer Gear Silhouette and Connector Body -->
    <g fill="url(#gearGrad)" stroke="#334155" stroke-width="6">
      <path d="M 256 76 L 276 76 A 180 180 0 0 1 334 88 L 344 116 A 140 140 0 0 0 293 116 L 286 86 C 276 84 266 84 256 84 C 246 84 236 84 226 86 L 219 116 A 140 140 0 0 0 168 116 L 178 88 A 180 180 0 0 1 236 76 Z" transform="rotate(0 256 256)"/>
      <path d="M 256 76 L 276 76 A 180 180 0 0 1 334 88 L 344 116 A 140 140 0 0 0 293 116 L 286 86 C 276 84 266 84 256 84 C 246 84 236 84 226 86 L 219 116 A 140 140 0 0 0 168 116 L 178 88 A 180 180 0 0 1 236 76 Z" transform="rotate(45 256 256)"/>
      <path d="M 256 76 L 276 76 A 180 180 0 0 1 334 88 L 344 116 A 140 140 0 0 0 293 116 L 286 86 C 276 84 266 84 256 84 C 246 84 236 84 226 86 L 219 116 A 140 140 0 0 0 168 116 L 178 88 A 180 180 0 0 1 236 76 Z" transform="rotate(90 256 256)"/>
      <path d="M 256 76 L 276 76 A 180 180 0 0 1 334 88 L 344 116 A 140 140 0 0 0 293 116 L 286 86 C 276 84 266 84 256 84 C 246 84 236 84 226 86 L 219 116 A 140 140 0 0 0 168 116 L 178 88 A 180 180 0 0 1 236 76 Z" transform="rotate(135 256 256)"/>
      <path d="M 256 76 L 276 76 A 180 180 0 0 1 334 88 L 344 116 A 140 140 0 0 0 293 116 L 286 86 C 276 84 266 84 256 84 C 246 84 236 84 226 86 L 219 116 A 140 140 0 0 0 168 116 L 178 88 A 180 180 0 0 1 236 76 Z" transform="rotate(180 256 256)"/>
      <path d="M 256 76 L 276 76 A 180 180 0 0 1 334 88 L 344 116 A 140 140 0 0 0 293 116 L 286 86 C 276 84 266 84 256 84 C 246 84 236 84 226 86 L 219 116 A 140 140 0 0 0 168 116 L 178 88 A 180 180 0 0 1 236 76 Z" transform="rotate(225 256 256)"/>
      <path d="M 256 76 L 276 76 A 180 180 0 0 1 334 88 L 344 116 A 140 140 0 0 0 293 116 L 286 86 C 276 84 266 84 256 84 C 246 84 236 84 226 86 L 219 116 A 140 140 0 0 0 168 116 L 178 88 A 180 180 0 0 1 236 76 Z" transform="rotate(270 256 256)"/>
      <path d="M 256 76 L 276 76 A 180 180 0 0 1 334 88 L 344 116 A 140 140 0 0 0 293 116 L 286 86 C 276 84 266 84 256 84 C 246 84 236 84 226 86 L 219 116 A 140 140 0 0 0 168 116 L 178 88 A 180 180 0 0 1 236 76 Z" transform="rotate(315 256)"/>
      
      <!-- Inner circular connector body -->
      <circle cx="256" cy="256" r="140" />
    </g>

    <!-- Inner Hole of the Gear (Background of the neural web) -->
    <circle cx="256" cy="256" r="95" fill="#0f172a" stroke="#475569" stroke-width="4" />

    <!-- Neural Network representing AI/LLM components inside the gear -->
    <g stroke="url(#neuralGrad)" stroke-width="3" opacity="0.85">
      <!-- Connection paths -->
      <line x1="256" y1="196" x2="206" y2="246" />
      <line x1="256" y1="196" x2="306" y2="246" />
      <line x1="206" y1="246" x2="226" y2="316" />
      <line x1="306" y1="246" x2="286" y2="316" />
      <line x1="226" y1="316" x2="286" y2="316" />
      <line x1="256" y1="196" x2="256" y2="276" />
      <line x1="206" y1="246" x2="256" y2="276" />
      <line x1="306" y1="246" x2="256" y2="276" />
      <line x1="226" y1="316" x2="256" y2="276" />
      <line x1="286" y1="316" x2="256" y2="276" />
    </g>

    <!-- Neural Nodes with glowing effect -->
    <g filter="url(#glow)">
      <!-- Central core -->
      <circle cx="256" cy="276" r="14" fill="#22d3ee" stroke="#0891b2" stroke-width="2" />
      
      <!-- Surrounding nodes -->
      <circle cx="256" cy="196" r="10" fill="#38bdf8" stroke="#0284c7" stroke-width="2" />
      <circle cx="206" cy="246" r="10" fill="#38bdf8" stroke="#0284c7" stroke-width="2" />
      <circle cx="306" cy="246" r="10" fill="#38bdf8" stroke="#0284c7" stroke-width="2" />
      <circle cx="226" cy="316" r="10" fill="#38bdf8" stroke="#0284c7" stroke-width="2" />
      <circle cx="286" cy="316" r="10" fill="#38bdf8" stroke="#0284c7" stroke-width="2" />
    </g>
  </g>
</svg>

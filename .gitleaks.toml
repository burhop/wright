title = "Wright Gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Historical Onshape credential examples in the MCP credential setup spec are placeholders, not live credentials."
condition = "AND"
paths = ['''specs/026-mcp-credential-setup/data-model\.md''']
regexTarget = "secret"
regexes = [
  '''on_dPlLqKAcKfwxInzX8JVqw''',
  '''iG5e4db0lzGzZmIO8oWMhl01nTaDODgAbR8IRhJpOeRFNBce''',
]

[[allowlists]]
description = "Deleted hackathon prototype documentation used a local placeholder bearer token, not a live secret."
condition = "AND"
paths = ['''docs/nous-hackathon-prototype\.md''']
regexTarget = "secret"
regexes = ['''wright-local-dev''']

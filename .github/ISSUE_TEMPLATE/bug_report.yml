name: Bug Report
description: Report a bug or unexpected behavior in the Wright toolbox
title: "[BUG]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below with as much detail as possible to help us reproduce and resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Explain how we can reproduce this issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment Details
      description: Where are you running Wright?
      options:
        - Docker deployment
        - Local development
        - CI/CD
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Wright Version / Commit SHA
      description: The version of Wright or specific Git commit SHA you are using.
      placeholder: e.g. v1.0.0 or 37f2da2
    validations:
      required: true
  - type: input
    id: docker-version
    attributes:
      label: Docker Version (if applicable)
      description: The version of Docker and Docker Compose you are using.
      placeholder: e.g. Docker v26.1.1, Compose v2.27.0
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating System
      description: The host operating system you are running.
      placeholder: e.g. Ubuntu 22.04 LTS, macOS Sonoma, Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Screenshots
      description: Paste any error logs, terminal output, or screenshots here.
      placeholder: Error log stack trace...
    validations:
      required: false

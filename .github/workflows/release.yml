name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare OCI Build Args
        id: prep
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${VERSION#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "revision=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Classify Release Tag
        id: tag
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          IS_PRERELEASE=false

          if [[ "$TAG_NAME" =~ -(alpha|beta|rc)(\.|[0-9]|$) ]]; then
            IS_PRERELEASE=true
          fi

          {
            echo "tag_name=$TAG_NAME"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "docker_tags<<EOF"
            echo "${DOCKERHUB_USERNAME}/wright-agent:${TAG_NAME}"
            if [[ "$IS_PRERELEASE" != "true" ]]; then
              echo "${DOCKERHUB_USERNAME}/wright-agent:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # platforms: linux/amd64,linux/arm64 # Uncomment to enable multi-architecture builds when arm64 solvers are fully supported
          tags: ${{ steps.tag.outputs.docker_tags }}
          build-args: |
            VERSION=${{ steps.prep.outputs.version }}
            REVISION=${{ steps.prep.outputs.revision }}
            CREATED=${{ steps.prep.outputs.created }}

      - name: Sync Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/wright-agent
          readme-filepath: docker/DOCKER_HUB_README.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          draft: false
          prerelease: ${{ steps.tag.outputs.is_prerelease == 'true' }}
          generate_release_notes: true

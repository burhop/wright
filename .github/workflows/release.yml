name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare OCI Build Args
        id: prep
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${VERSION#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "revision=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Classify Release Tag
        id: tag
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          IS_PRERELEASE=false
          GHCR_OWNER_LC="$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')"
          HAS_DOCKERHUB=false

          if [[ "$TAG_NAME" =~ -(alpha|beta|rc)(\.|[0-9]|$) ]]; then
            IS_PRERELEASE=true
          fi

          {
            echo "tag_name=$TAG_NAME"
            echo "is_prerelease=$IS_PRERELEASE"
            if [[ -n "${DOCKERHUB_USERNAME:-}" && -n "${DOCKERHUB_TOKEN:-}" ]]; then
              echo "has_dockerhub=true"
              HAS_DOCKERHUB=true
            else
              echo "has_dockerhub=false"
            fi
            echo "docker_tags<<EOF"
            echo "ghcr.io/${GHCR_OWNER_LC}/wright-agent:${TAG_NAME}"
            if [[ "$HAS_DOCKERHUB" == "true" ]]; then
              echo "${DOCKERHUB_USERNAME}/wright-agent:${TAG_NAME}"
            fi
            if [[ "$IS_PRERELEASE" != "true" ]]; then
              echo "ghcr.io/${GHCR_OWNER_LC}/wright-agent:latest"
              if [[ "$HAS_DOCKERHUB" == "true" ]]; then
                echo "${DOCKERHUB_USERNAME}/wright-agent:latest"
              fi
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # platforms: linux/amd64,linux/arm64 # Uncomment to enable multi-architecture builds when arm64 solvers are fully supported
          tags: ${{ steps.tag.outputs.docker_tags }}
          build-args: |
            VERSION=${{ steps.prep.outputs.version }}
            REVISION=${{ steps.prep.outputs.revision }}
            CREATED=${{ steps.prep.outputs.created }}

      - name: Sync Docker Hub Description
        if: ${{ steps.tag.outputs.has_dockerhub == 'true' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_USERNAME }}/wright-agent
          readme-filepath: docker/DOCKER_HUB_README.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          draft: false
          prerelease: ${{ steps.tag.outputs.is_prerelease == 'true' }}
          generate_release_notes: true

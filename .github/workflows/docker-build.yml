name: OCI candidate build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      push-candidate:
        required: true
        type: boolean
    outputs:
      digest:
        value: ${{ jobs.build-candidate.outputs.digest }}
      image:
        value: ${{ jobs.build-candidate.outputs.image }}
permissions:
  contents: read

jobs:
  build-candidate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout reviewed source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Resolve canonical image
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/wright" >> "$GITHUB_OUTPUT"
      - name: Log in to canonical registry for release candidate
        if: ${{ inputs.push-candidate }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the candidate exactly once
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.push-candidate }}
          load: ${{ ! inputs.push-candidate }}
          tags: ${{ steps.image.outputs.name }}:candidate-${{ github.sha }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ inputs.version }}
            REVISION=${{ github.sha }}
            CREATED=1970-01-01T00:00:00Z
      - name: Smoke exact candidate
        env:
          IMAGE: ${{ inputs.push-candidate && format('{0}@{1}', steps.image.outputs.name, steps.build.outputs.digest) || format('{0}:candidate-{1}', steps.image.outputs.name, github.sha) }}
        run: WRIGHT_DOCKER_IMAGE="$IMAGE" WRIGHT_DOCKER_SKIP_BUILD=1 scripts/docker-smoke-test.sh
      - name: Scan exact candidate with blocking policy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ inputs.push-candidate && format('{0}@{1}', steps.image.outputs.name, steps.build.outputs.digest) || format('{0}:candidate-{1}', steps.image.outputs.name, github.sha) }}
          format: json
          output: trivy.json
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
      - name: Enforce vulnerability exceptions
        run: python -c "from pathlib import Path; from scripts.release.vulnerability_policy import evaluate_report; evaluate_report(Path('trivy.json'), Path('docker/release-policy.json'))"
      - name: Attest pushed candidate digest
        if: ${{ inputs.push-candidate }}
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Record candidate evidence
        shell: bash
        run: |
          mkdir -p oci-evidence
          cp trivy.json docker/release-policy.json docker/dependency-inventory.md oci-evidence/
          printf '%s\n' '${{ steps.build.outputs.digest }}' > oci-evidence/digest.txt
          printf '%s\n' 'linux/amd64' > oci-evidence/platforms.txt
      - name: Upload candidate evidence
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: oci-candidate-evidence
          path: oci-evidence
          if-no-files-found: error

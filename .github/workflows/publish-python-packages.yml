name: publish-python-packages

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
      package:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-candidate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download the build-once candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: dist
      - name: Verify package identity and recorded hashes
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.package }}" = "wright-engineering"
          test "$(find dist -maxdepth 1 -name '*.whl' | wc -l)" = 1
          test "$(find dist -maxdepth 1 -name '*.tar.gz' | wc -l)" = 1
          (cd dist && sha256sum --check SHA256SUMS)
          python - <<'PY'
          import pathlib, re
          files = [p.name for p in pathlib.Path("dist").iterdir() if p.suffix == ".whl" or p.name.endswith(".tar.gz")]
          expected = "${{ inputs.version }}".replace("-alpha.", "a").replace("-beta.", "b").replace("-rc.", "rc")
          if not all(re.search(rf"wright[_-]engineering-{re.escape(expected)}", name) for name in files):
              raise SystemExit(f"candidate filenames do not match version {expected}: {files}")
          PY
      - name: Re-upload verified immutable candidate
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: verified-python-candidate
          path: dist
          if-no-files-found: error

  publish-testpypi:
    needs: verify-candidate
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ inputs.package }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verified-python-candidate
          path: dist
      - run: (cd dist && sha256sum --check SHA256SUMS)
      - name: Publish exact files to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true

  verify-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install and smoke TestPyPI subject
        run: |
          python -m pip install --index-url https://test.pypi.org/simple/ --no-deps "${{ inputs.package }}==${{ inputs.version }}"
          wright --version
          wright doctor
  publish-pypi:
    needs: verify-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ inputs.package }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verified-python-candidate
          path: dist
      - run: (cd dist && sha256sum --check SHA256SUMS)
      - name: Publish the same files to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
          skip-existing: true

  verify-pypi:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install and smoke PyPI subject
        run: |
          python -m pip install --no-deps "${{ inputs.package }}==${{ inputs.version }}"
          wright --version
          wright doctor

name: publish-python-packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - wright-engineering
      version:
        description: Expected package version
        required: true
        type: string
      target:
        description: Package index target
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
  push:
    tags:
      - 'wright-engineering-v*'

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.meta.outputs.package }}
      package-dir: ${{ steps.meta.outputs.package_dir }}
      target: ${{ steps.meta.outputs.target }}
    steps:
      - name: Resolve package metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            package="${{ inputs.package }}"
            target="${{ inputs.target }}"
          else
            tag="${GITHUB_REF_NAME}"
            target="pypi"
            case "$tag" in
              wright-engineering-v*) package="wright-engineering" ;;
              *) echo "Unsupported package tag: $tag" >&2; exit 1 ;;
            esac
          fi
          case "$package" in
            wright-engineering) package_dir="." ;;
            *) echo "Unsupported package: $package" >&2; exit 1 ;;
          esac
          echo "package=$package" >> "$GITHUB_OUTPUT"
          echo "package_dir=$package_dir" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Validate and build package
        run: scripts/build-python-distributions.sh --skip-clean-install --dist-root dist/python-packages "${{ needs.prepare.outputs.package-dir }}"

      - name: Upload package distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/python-packages/**

  publish-testpypi:
    if: ${{ needs.prepare.outputs.target == 'testpypi' }}
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ needs.prepare.outputs.package }}
    permissions:
      id-token: write
    steps:
      - name: Download package distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/${{ needs.prepare.outputs.package }}/

  publish-pypi:
    if: ${{ needs.prepare.outputs.target == 'pypi' }}
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.prepare.outputs.package }}
    permissions:
      id-token: write
    steps:
      - name: Download package distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/${{ needs.prepare.outputs.package }}/

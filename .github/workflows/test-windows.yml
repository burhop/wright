name: test-windows

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:  # Manual trigger for ad-hoc testing

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: Configure Git for tests
        run: |
          git config --global user.email "test-ci@example.com"
          git config --global user.name "CI Test Runner"

      - name: Run pytest
        run: uv run pytest

  frontend-tests:
    name: Frontend Tests (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test --workspace=apps/web

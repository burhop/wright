name: test-windows

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:  # Manual trigger for ad-hoc testing

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: Configure Git for tests
        run: |
          git config --global user.email "test-ci@example.com"
          git config --global user.name "CI Test Runner"

      - name: Run pytest
        run: uv run pytest

  frontend-tests:
    name: Frontend Tests (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test --workspace=apps/web

  playwright-tests:
    name: Playwright E2E (Windows)
    runs-on: windows-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Python dependencies
        run: uv sync --all-packages --all-groups

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start backend server
        run: |
          $env:LLM_API_URL = "http://127.0.0.1:8000/v1"
          $env:DATABASE_PATH = "$env:RUNNER_TEMP\wright-ci.db"
          $api = Start-Process -NoNewWindow -FilePath ".\.venv\Scripts\python.exe" `
            -ArgumentList "-m", "uvicorn", "api.main:app", "--host", "127.0.0.1", "--port", "8000" `
            -RedirectStandardOutput "$env:RUNNER_TEMP\wright-api.out.log" `
            -RedirectStandardError "$env:RUNNER_TEMP\wright-api.err.log" `
            -PassThru
          $api.Id | Set-Content "$env:RUNNER_TEMP\wright-api.pid"
        shell: pwsh

      - name: Start frontend dev server
        run: |
          $web = Start-Process -NoNewWindow -FilePath "npm.cmd" `
            -ArgumentList "run", "dev", "--workspace=apps/web", "--", "--host", "127.0.0.1" `
            -RedirectStandardOutput "$env:RUNNER_TEMP\wright-web.out.log" `
            -RedirectStandardError "$env:RUNNER_TEMP\wright-web.err.log" `
            -PassThru
          $web.Id | Set-Content "$env:RUNNER_TEMP\wright-web.pid"
        shell: pwsh

      - name: Wait for servers
        run: |
          $ErrorActionPreference = "Stop"

          function Write-ServerLogs {
            foreach ($path in @(
              "$env:RUNNER_TEMP\wright-api.err.log",
              "$env:RUNNER_TEMP\wright-api.out.log",
              "$env:RUNNER_TEMP\wright-web.err.log",
              "$env:RUNNER_TEMP\wright-web.out.log"
            )) {
              if (Test-Path $path) {
                Write-Host "::group::$([System.IO.Path]::GetFileName($path))"
                Get-Content $path -Tail 200
                Write-Host "::endgroup::"
              }
            }
          }

          function Wait-ForUrl {
            param(
              [string]$Name,
              [string]$Url
            )

            for ($attempt = 1; $attempt -le 120; $attempt++) {
              $probe = & curl.exe --fail --silent --show-error --max-time 2 $Url 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "$Name is ready at $Url"
                return
              }

              if (($attempt % 15) -eq 0) {
                Write-Host "$Name is not ready yet at $Url"
                if ($probe) {
                  Write-Host $probe
                }
              }

              Start-Sleep -Seconds 2
            }

            Write-ServerLogs
            throw "$Name did not become ready at $Url"
          }

          Wait-ForUrl -Name "Backend" -Url "http://127.0.0.1:8000/api/health"
          Wait-ForUrl -Name "Frontend" -Url "http://127.0.0.1:5173"
        shell: pwsh

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-server-logs
          path: |
            ${{ runner.temp }}/wright-api*.log
            ${{ runner.temp }}/wright-web*.log
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-windows
          path: playwright-report/
          retention-days: 7

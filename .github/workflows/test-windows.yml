name: test-windows

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:  # Manual trigger for ad-hoc testing

jobs:
  backend-tests:
    name: Backend Tests (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: Configure Git for tests
        run: |
          git config --global user.email "test-ci@example.com"
          git config --global user.name "CI Test Runner"

      - name: Run pytest
        run: uv run pytest

  frontend-tests:
    name: Frontend Tests (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test --workspace=apps/web

  playwright-tests:
    name: Playwright E2E (Windows)
    runs-on: windows-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Python dependencies
        run: uv sync --all-packages --all-groups

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start backend server
        run: |
          $env:LLM_API_URL = "http://127.0.0.1:8000/v1"
          Start-Process -NoNewWindow -FilePath "uv" -ArgumentList "run", "uvicorn", "api.main:app", "--host", "127.0.0.1", "--port", "8000"
        shell: pwsh

      - name: Start frontend dev server
        run: |
          Start-Process -NoNewWindow -FilePath "npm" -ArgumentList "run", "dev", "--workspace=apps/web", "--", "--host"
        shell: pwsh

      - name: Wait for servers
        run: Start-Sleep -Seconds 15
        shell: pwsh

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-windows
          path: playwright-report/
          retention-days: 7

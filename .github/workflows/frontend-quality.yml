name: frontend-quality

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npx -w apps/web eslint .

      - name: Check Formatting with Prettier
        run: npx prettier --check apps/web/

      - name: Type Check with TSC
        run: npx tsc --noEmit -p apps/web/tsconfig.app.json

      - name: Run Vitest
        run: npm run test --workspace=apps/web

      - name: Build frontend
        run: npm run build --workspace=apps/web

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: frontend-quality

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Python dependencies
        run: uv sync --all-packages --all-groups

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start backend server
        run: |
          LLM_API_URL="http://127.0.0.1:8000/v1" \
          DATABASE_PATH="${RUNNER_TEMP}/wright-ci.db" \
          uv run uvicorn api.main:app --host 127.0.0.1 --port 8000 \
            >"${RUNNER_TEMP}/wright-api.out.log" \
            2>"${RUNNER_TEMP}/wright-api.err.log" &
          echo "$!" >"${RUNNER_TEMP}/wright-api.pid"

      - name: Wait for backend
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error --max-time 2 http://127.0.0.1:8000/api/health; then
              echo "Backend is ready"
              exit 0
            fi

            if ! kill -0 "$(cat "${RUNNER_TEMP}/wright-api.pid")" 2>/dev/null; then
              echo "Backend process exited before becoming ready"
              cat "${RUNNER_TEMP}/wright-api.err.log"
              cat "${RUNNER_TEMP}/wright-api.out.log"
              exit 1
            fi

            sleep 2
          done

          echo "Backend did not become ready"
          cat "${RUNNER_TEMP}/wright-api.err.log"
          cat "${RUNNER_TEMP}/wright-api.out.log"
          exit 1

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-server-logs
          path: |
            ${{ runner.temp }}/wright-api*.log
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

name: frontend-quality

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npx -w apps/web eslint .

      - name: Check Formatting with Prettier
        run: npx prettier --check apps/web/

      - name: Type Check with TSC
        run: npx tsc --noEmit -p apps/web/tsconfig.app.json

      - name: Run Vitest
        run: npm run test --workspace=apps/web

      - name: Build frontend
        run: npm run build --workspace=apps/web

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: frontend-quality

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Python dependencies
        run: uv sync --all-packages --all-groups

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start backend server
        run: |
          LLM_API_URL="http://127.0.0.1:8000/v1" \
          DATABASE_PATH="${RUNNER_TEMP}/wright-ci.db" \
          uv run uvicorn api.main:app --host 127.0.0.1 --port 8000 \
            >"${RUNNER_TEMP}/wright-api.out.log" \
            2>"${RUNNER_TEMP}/wright-api.err.log" &
          echo "$!" >"${RUNNER_TEMP}/wright-api.pid"

      - name: Wait for backend
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error --max-time 2 http://127.0.0.1:8000/api/health; then
              echo "Backend is ready"
              exit 0
            fi

            if ! kill -0 "$(cat "${RUNNER_TEMP}/wright-api.pid")" 2>/dev/null; then
              echo "Backend process exited before becoming ready"
              cat "${RUNNER_TEMP}/wright-api.err.log"
              cat "${RUNNER_TEMP}/wright-api.out.log"
              exit 1
            fi

            sleep 2
          done

          echo "Backend did not become ready"
          cat "${RUNNER_TEMP}/wright-api.err.log"
          cat "${RUNNER_TEMP}/wright-api.out.log"
          exit 1

      - name: Run Playwright tests
        run: PLAYWRIGHT_INCLUDE_LIVE=1 npx playwright test

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-server-logs
          path: |
            ${{ runner.temp }}/wright-api*.log
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

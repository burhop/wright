name: public-alpha-safety

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  leak-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.26"

      - name: Set up Node 24 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Run Public Alpha Leak Scan
        run: python scripts/check-public-alpha-leaks.py

      - name: Run Python dependency audit with expiring exceptions
        shell: bash
        run: |
          uv run --with pip-audit pip-audit --format json --output pip-audit.json || true
          python -c "from pathlib import Path; from scripts.release.dependency_audit import evaluate_pip_audit; evaluate_pip_audit(Path('pip-audit.json'), Path('.github/dependency-audit-policy.json'))"

      - name: Run blocking npm dependency audit
        run: npm audit --audit-level=high

      - name: Run Gitleaks History Scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git /repo \
            --config /repo/.gitleaks.toml \
            --no-banner \
            --redact \
            --verbose

      - name: Run TruffleHog History Scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/trufflesecurity/trufflehog:3.95.7 \
            git file:///repo \
            --no-update \
            --fail \
            --results=verified,unknown \
            --no-verification \
            --exclude-globs=uv.lock,package-lock.json

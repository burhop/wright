[project]
name = "wright-data-vault"
version = "0.1.0"
description = "RAG connectors (LanceDB), SQLite clients (WAL mode), and filesystem managers for artifact vault"
requires-python = ">=3.11"

dependencies = [
    "pydantic>=2.7",
    "lancedb>=0.6",
    "aiosqlite>=0.20",
    "wright-core",
]

[tool.uv.sources]
wright-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/data_vault"]

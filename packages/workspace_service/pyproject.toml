[project]
name = "wright-workspace-service"
version = "0.1.0"
description = "Workspace lifecycle orchestration facade for Wright"
requires-python = ">=3.11"

dependencies = [
    "pydantic>=2.7",
    "wright-core",
    "wright-agent-adapters",
    "wright-data-vault",
    "wright-tool-registry",
]

[tool.uv.sources]
wright-core = { workspace = true }
wright-agent-adapters = { workspace = true }
wright-data-vault = { workspace = true }
wright-tool-registry = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workspace_service"]

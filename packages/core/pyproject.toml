[project]
name = "wright-core"
version = "0.1.0"
description = "Shared domain models, structured JSON logging, and common utilities"
requires-python = ">=3.11"

dependencies = [
    "pydantic>=2.7",
    "structlog>=24.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]

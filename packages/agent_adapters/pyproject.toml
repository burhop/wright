[project]
name = "wright-agent-adapters"
version = "0.1.0"
description = "Adapter pattern interfaces for LLM agents (Hermes, openclaw, PI)"
requires-python = ">=3.11"

dependencies = [
    "pydantic>=2.7",
    "wright-core",
    "httpx>=0.28",
    "httpx-sse>=0.4",
    "PyYAML>=6.0",
]

[tool.uv.sources]
wright-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_adapters"]

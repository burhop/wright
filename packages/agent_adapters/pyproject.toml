[project]
name = "wright-agent-adapters"
version = "0.1.0"
description = "Adapter pattern interfaces for LLM agents (Hermes, openclaw, PI)"
requires-python = ">=3.11"
readme = "README.md"
license = "MIT"
authors = [{ name = "Wright Project", email = "wright@example.com" }]
classifiers = [
    "Private :: Do Not Upload",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "pydantic>=2.7",
    "wright-core>=0.1.0,<0.2.0",
    "httpx>=0.28",
    "httpx-sse>=0.4",
    "PyYAML>=6.0",
]

[project.urls]
Homepage = "https://github.com/burhop/wright"
Source = "https://github.com/burhop/wright/tree/dev/packages/agent_adapters"
Issues = "https://github.com/burhop/wright/issues"
Documentation = "https://burhop.github.io/wright/"
Releases = "https://github.com/burhop/wright/releases"

[tool.uv.sources]
wright-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_adapters"]

servers:
  - id: oasis-open-fem-agent
    name: "OASiS Open FEM Agent"
    vendor: Hereon-InstituteMS
    description: >
      Multi-solver finite element MCP server for scikit-fem, FEniCSx,
      NGSolve, deal.II, Kratos, DUNE-fem, 4C, and FEBio backends.
    domains: [fea, simulation]
    tags: [open-source, linux, headless, local, scikit-fem]
    transport: stdio
    command: ["python", "-m", "server"]
    source_url: https://github.com/Hereon-InstituteMS/OASiS
    image_url: https://avatars.githubusercontent.com/u/139527664?s=64
    locality: local
    weight: heavy
    env_vars:
      - name: PYVISTA_OFF_SCREEN
        label: "PyVista off-screen mode"
        description: "Set to true for headless Linux/container validation."
        required: false
        secret: false
    dependencies:
      system: []
      python: [oasis-mcp, scikit-fem]
      node: []
    aliases: [open-fem-agent, Open FEM Agent, OASiS]
    verification_state: community_mcp
    installability_tier: tested
    risk_level: high
    deployment_mode: local-only
    platform_support:
      windows_11_x64:
        status: "unknown"
        tested: false
        notes: "not tested; backend support must be checked per solver"
      linux_x64:
        status: "yes"
        tested: true
        notes: "clean Intel Ubuntu validation passed with scikit-fem backend"
      linux_arm64:
        status: "unknown"
        tested: false
        notes: "not tested; Python wheels and solver backends must be checked"
      macos_x64:
        status: "likely"
        tested: false
        notes: "not tested; backend support must be checked per solver"
      macos_arm64:
        status: "unknown"
        tested: false
        notes: "not tested; Python wheels and solver backends must be checked"
    host_software_required:
      - Python
      - optional solver backends selected by the user
    default_enabled: false
    approval_gates: [workspace_write_approval, execute_code_approval]
    validation_result:
      status: passed
      message: "Clean Intel Ubuntu validation passed with source install, 15 MCP tools, scikit-fem discovery, Poisson prepare_simulation, Poisson run_simulation, result.vtu output, and upstream MCP stdio tests 5/5."
      environment: ubuntu-linux-x64-container
      missing_dependencies: []

  - id: freecad-mcp-sandraschi
    name: "FreeCAD Engineering"
    vendor: sandraschi
    description: >
      End-to-end engineering: FreeCAD geometry → CalculiX FEA →
      OpenFOAM CFD → PrusaSlicer G-code.
    domains: [cad, fea, cfd, cam]
    tags: [open-source, linux, headless, local, freecad, calculix, openfoam]
    transport: stdio
    command: ["uv", "run", "--with", "git+https://github.com/sandraschi/freecad-mcp.git", "python", "-m", "freecad_mcp.server", "--mode", "stdio"]
    source_url: https://github.com/sandraschi/freecad-mcp
    image_url: https://raw.githubusercontent.com/sandraschi/freecad-mcp/main/icon.png
    locality: local
    weight: heavy
    env_vars:
      - name: FREECAD_PATH
        label: "FreeCADCmd path"
        description: "Path to the selected FreeCAD headless executable, for example an extracted AppImage usr/bin/freecadcmd."
        required: true
        secret: false
    dependencies:
      system: [FreeCAD, CalculiX, OpenFOAM, PrusaSlicer]
      python: [freecad-mcp]
      node: []
    verification_state: community_mcp
    installability_tier: non_working
    risk_level: high
    deployment_mode: local-bridge
    host_software_required: [FreeCAD, CalculiX, OpenFOAM, PrusaSlicer]
    approval_gates: [workspace_write_approval, execute_code_approval]
    platform_support:
      windows_11_x64:
        status: "host-dependent"
        tested: false
        notes: "requires FreeCAD and optional simulation/slicer hosts; not tested on Windows"
      linux_x64:
        status: "no"
        tested: true
        notes: "clean Intel Ubuntu validation installed FreeCAD 1.1.1 AppImage and direct FreeCAD STL export worked, but MCP status stayed false and create_shape returned success while no STL was produced"
      linux_arm64:
        status: "unknown"
        tested: false
        notes: "not tested; FreeCAD AppImage/backend and Python package support must be checked"
      macos_x64:
        status: "host-dependent"
        tested: false
        notes: "requires FreeCAD and optional simulation/slicer hosts; not tested on macOS"
      macos_arm64:
        status: "host-dependent"
        tested: false
        notes: "requires FreeCAD and optional simulation/slicer hosts; not tested on macOS ARM64"
    validation_result:
      status: failed
      message: "Clean Intel Ubuntu validation cloned commit a71f60a71987ac23a65a3bdeda5f71c8f1579efb, installed dependencies with uv sync --extra dev, and upstream tests passed 94 with 2 integration tests deselected. MCP initialized as FreeCAD MCP 3.4.2, listed 47 tools, and freecad_status returned success:false/freecad_ok:false. FreeCAD 1.1.1 AppImage direct CLI exported /tmp/direct_freecad_box.stl at 684 bytes. The advertised --freecad-path option did not affect the subprocess path: create_shape returned FreeCADCmd not found. With FREECAD_PATH=/tmp/freecadcmd, create_shape ran FreeCAD but returned success:true while stderr reported Cannot create a mesh out of a 'Part.Solid' and no STL output was produced."
      environment: ubuntu-linux-x64-container
      missing_dependencies: []
    follow_up_url: docs/mcp-catalog/followups/freecad-engineering-sandraschi.md
    install_blocked_reason: "Clean Intel Ubuntu validation found incorrect success reporting and failed STL creation through the MCP server; see follow-up record."
    headless_ok: "no"


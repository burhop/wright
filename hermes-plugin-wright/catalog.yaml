    command: ["node", "dist/index.js"]
    source_url: https://github.com/autodesk-platform-services/aps-mcp-server-nodejs
    locality: remote
    weight: light
    env_vars:
      - name: APS_CLIENT_ID
        label: "APS Client ID"
        description: "Developer client ID from developer.autodesk.com"
        required: true
        secret: false
      - name: APS_CLIENT_SECRET
        label: "APS Client Secret"
        description: "Developer client secret from developer.autodesk.com"
        required: true
        secret: true
    dependencies:
      system: []
      python: []
      node: [aps-mcp-server-nodejs]


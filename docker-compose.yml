# =============================================================================
# Wright — Production Docker Compose
# =============================================================================
# Strategy: Production containerization of the full Wright stack (API, web
# frontend, and agents).
# Security: All ports bound to 127.0.0.1 (localhost only) per constitution § 4.
# =============================================================================

services:
  # --- Wright Full-Stack Agent Appliance ---
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wright_agent
    env_file:
      - docker/.env
    ports:
      - "127.0.0.1:8000:8000"              # FastAPI (API + static frontend) — localhost only
      - "127.0.0.1:5173:5173"              # Vite Dev server (if used in test/debug) — localhost only
    volumes:
      - wright_data:/home/agent/.local/share/wright
      - wright_workspaces:/home/agent/workspace
      - wright_config:/home/agent/.config/wright
      - wright_hermes:/home/agent/.hermes
      - wright_logs:/var/log/
      # Recovery tools mounted read-only
      - ./scripts:/recovery:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=512m
      - /home/agent/.cache:rw,noexec,nosuid,size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      - WRIGHT_ENV=production
      - WRIGHT_BIND_HOST=0.0.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      - jaeger

  # --- Jaeger (OpenTelemetry trace collector) ---
  # Constitution § 7: Local OpenTelemetry via Jaeger all-in-one
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: wright_jaeger
    ports:
      - "127.0.0.1:16686:16686"            # Jaeger UI — localhost only
      - "127.0.0.1:4317:4317"              # OTLP gRPC — localhost only
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

volumes:
  wright_data:
    name: wright_data
  wright_workspaces:
    name: wright_workspaces
  wright_config:
    name: wright_config
  wright_hermes:
    name: wright_hermes
  wright_logs:
    name: wright_logs


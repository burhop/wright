# =============================================================================
# Wright — Production Docker Compose
# =============================================================================
# Strategy: Production containerization of the full Wright stack (API, web
# frontend, and agents).
# Security: All ports bound to 127.0.0.1 (localhost only) per constitution § 4.
# =============================================================================

services:
  # --- Wright Full-Stack Agent Appliance ---
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wright_agent
    env_file:
      - docker/.env
    ports:
      - "127.0.0.1:8000:8000"              # FastAPI (API + static frontend) — localhost only
      - "127.0.0.1:5173:5173"              # Vite Dev server (if used in test/debug) — localhost only
    volumes:
      - wright_home:/home/
      - wright_local:/usr/local/
      - wright_opt:/opt/
      - wright_varlib:/var/lib/
      - wright_varcache:/var/cache/
      - wright_etc:/etc/
      - wright_logs:/var/log/
      # Recovery tools mounted read-only
      - ./scripts:/recovery:ro
    environment:
      - WRIGHT_ENV=production
      - WRIGHT_BIND_HOST=0.0.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      - jaeger

  # --- Jaeger (OpenTelemetry trace collector) ---
  # Constitution § 7: Local OpenTelemetry via Jaeger all-in-one
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: wright_jaeger
    ports:
      - "127.0.0.1:16686:16686"            # Jaeger UI — localhost only
      - "127.0.0.1:4317:4317"              # OTLP gRPC — localhost only
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

volumes:
  wright_home:
    name: wright_home
  wright_local:
    name: wright_local
  wright_opt:
    name: wright_opt
  wright_varlib:
    name: wright_varlib
  wright_varcache:
    name: wright_varcache
  wright_etc:
    name: wright_etc
  wright_logs:
    name: wright_logs

